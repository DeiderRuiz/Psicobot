<!-- Plantilla Base -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap" rel="stylesheet" />
    <!-- Icono -->
    <link rel="icon" type="Images/ico" href="{{url_for('static',filename='favicon.ico')}}">
    <!-- Hoja de estilos (Tailwind la usa) -->
    <link rel="stylesheet" href="{{url_for('static',filename='css/main.css')}}">
    <!-- Vue JS -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Bloque de titulo -->
    <title>Psicobot - {% block title %}{% endblock %}</title>
  </head>
  <body class="font-bree-serif antialiased flex flex-col h-screen">
    <!-- Navbar -->
    <nav class="bg-verde-uajs fixed w-full z-50 top-0 start-0 shadow-lg">
      <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4" id="app">
        <a href="{{ url_for('index') }}" class="flex items-center space-x-3 rtl:space-x-reverse">
          <div class="flex w-8 h-8 text-sm rounded-full bg-logo bg-cover bg-center"></div>
          <span class="self-center text-2xl whitespace-nowrap text-white">Psicobot</span>
        </a>
        <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1">
          <ul class="flex flex-col font-medium text-white p-4 md:p-0 mt-4 border rounded-lg md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0">
            <li v-if="url != '/'">
              <a href="{{ url_for('index') }}">Inicio</a>
            </li>
            <li>
              <a href="{{ url_for('atencion') }}">Rutas de atención</a>
            </li>
            <li>
              <a href="http://app.appyudame.com" target="_blank">Appyudame</a>
            </li>
          </ul>
        </div>
        <div>
          <button @click="perfil = !perfil" class="relative flex rounded-full bg-verde-uajs text-sm focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800 md:hidden">
            <svg class="w-[48px] h-[48px] text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-width="3" d="M5 7h14M5 12h14M5 17h14"/>
            </svg>
          </button>
          <div v-if="perfil" class="absolute right-0 z-10 mt-2 min-w-48 origin-top-right rounded-md bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none md:hidden">
            <a href="{{ url_for('atencion') }}" class="block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="user-menu-item-0">Rutas De Atención</a>
            <a href="http://app.appyudame.com" class="block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="user-menu-item-1">Appyudame</a>
          </div>
        </div>
      </div>
    </nav>
    <!-- Bloque de contenido -->
    {% block main %}
    {% endblock %}
    <!-- Script para importar Vue JS -->
    <script src="{{ url_for('static', filename='js/Vue.js') }}"></script>
  </body>
</html>
