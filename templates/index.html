<!-- Extensión de guest.html -->
{% extends 'guest.html' %}
{% block title %}Inicio{% endblock %}
<!-- Bloque del contenido de la tarjeta -->
{% block content %}
    <div class="mt-5">
        <a href="{{ url_for('login') }}" class="flex justify-center w-full mb-5 px-4 py-2 bg-verde-uajs border border-verde-paris rounded-md text-white uppercase tracking-widest hover:bg-verde-paris focus:bg-verde-paris active:bg-verde-uajs focus:outline-none focus:ring-2 focus:ring-verde-paris focus:ring-offset-2 transition ease-in-out duration-150">
            Iniciar Sesión
        </a>
        <a href="{{ url_for('register') }}" class="flex justify-center w-full mb-5 px-4 py-2 bg-verde-uajs border border-verde-paris rounded-md text-white uppercase tracking-widest hover:bg-verde-paris focus:bg-verde-paris active:bg-verde-uajs focus:outline-none focus:ring-2 focus:ring-verde-paris focus:ring-offset-2 transition ease-in-out duration-150">
            Registrarse
        </a>
    </div>
{% endblock %}
